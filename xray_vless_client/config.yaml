name: "Xray VLESS Client"
version: "1.0.2"
slug: "xray_vless_client"
description: "Клиент Xray по VLESS-ссылке (как в Shadowrocket). Поднимает локальный SOCKS5 для обхода блокировок."
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
advanced: true

# Сеть хоста: SOCKS5 доступен по IP вашего HA в сети (см. README)
host_network: true

options:
  vless_url: ""
  socks_port: 1080

schema:
  vless_url: str
  socks_port: int?
